<!DOCTYPE html>
<html>
<head>
    <title>Manage Parties</title>

    <style>

        body{
            font-family: Arial;
            padding:20px;
        }

        table{
            width:100%;
            border-collapse: collapse;
        }

        th, td{
            border:1px solid #ccc;
            padding:10px;
            text-align:left;
        }

        th{
            background:#f2f2f2;
        }

        button{
            padding:6px 12px;
            cursor:pointer;
        }

        .delete-btn{
            background:red;
            color:white;
            border:none;
        }

    </style>
</head>

<body>

<h2>Manage Parties</h2>

<table>

<tr>
    <th>ID</th>
    <th>Party Name</th>
    <th>Address</th>
    <th>Edit</th>
    <th>Delete</th>
</tr>

{% for p in parties %}

<tr>

    <td>{{ p["id"] }}</td>

    <td>{{ p["party_name"] }}</td>

    <td>{{ p["party_address"] }}</td>

    <td>

        <a href="/edit_party/{{ p['id'] }}">
            <button>Edit</button>
        </a>

    </td>

    <td>

        <form method="POST"
            action="/delete_party/{{ p['id'] }}"
            onsubmit="return confirm('Delete this party?')">

            <button class="delete-btn">
                Delete
            </button>

        </form>

    </td>

</tr>

{% endfor %}

</table>

</body>
</html>
